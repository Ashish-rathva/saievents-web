<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Destination Wedding – SAI Events</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="holi-page">
    <div class="page page--holi">
      <header class="header">
        <a href="index.html#home" class="header__logo" aria-label="SAI Events home">
          <img src="assets/logo.png" alt="SAI Events" width="164" height="149" />
        </a>
        <nav class="header__nav">
          <a href="index.html#home">Home</a>
          <a href="index.html#services">Services</a>
          <a href="index.html#events">Events</a>
          <a href="index.html#contact">Contact</a>
        </nav>
        <a href="tel:+917801919073" class="btn btn--primary btn--small header__cta">
          Call Now
        </a>
      </header>

      <main class="dw">
        <section class="dw__hero">
          <div class="dw__hero-image"></div>
        </section>

        <section class="dw__intro">
          <div class="dw__intro-image"></div>
          <div class="dw__intro-text">
            <h1 class="dw__title">
              Our work speaks for itself
            </h1>
            <p class="dw__subtitle">
              Take a look at some of the memorable events we’ve brought to life,
              each thoughtfully designed and managed to deliver unforgettable
              experiences.
            </p>
          </div>
        </section>

        <section class="dw__gallery">
          <div class="dw__gallery-item dw__gallery-item--large">
            <div class="dw__gallery-image dw__gallery-image--1"></div>
          </div>
          <div class="dw__gallery-item">
            <div class="dw__gallery-image dw__gallery-image--2"></div>
          </div>
          <div class="dw__gallery-item">
            <div class="dw__gallery-image dw__gallery-image--3"></div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
